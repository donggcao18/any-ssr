name: anyssr-olora
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pytorch=2.5.1
  - pytorch-cuda=12.4
  - pyyaml
  - pip:
      # Core training stack
      - deepspeed==0.16.1
      - transformers==4.47.1
      - accelerate==0.32.1
      - peft==0.6.2
      - datasets==2.14.7
      - sentencepiece==0.2.0
      - einops==0.8.0
      - tqdm==4.67.1
      - numpy==1.25.2
      - scipy==1.14.1
      - hjson==3.1.0
      # Task-evaluation helpers used by evaluations/*.py and metrics.py
      - nltk==3.5
      - rouge==1.0.1
      - fuzzywuzzy==0.18.0
      - sacrebleu==2.4.3
      # Optional for CODETASK / Py150 parsing-related evaluation
      - tree-sitter==0.23.2
      - tree-sitter-language-pack==0.7.2
